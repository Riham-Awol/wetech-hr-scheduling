<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - WeTech HR</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 4rem);
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      padding: 2.5rem;
    }
    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }
    .demo-info {
      margin-top: 1.5rem;
      padding: 1rem;
      border-radius: 8px;
      background-color: rgba(255, 255, 255, 0.02);
      border: 1px dashed var(--border-glass);
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .demo-info strong {
      color: var(--text-main);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="login-container">
      <div class="card login-card">
        <div class="login-header">
          <div class="logo-icon" style="margin: 0 auto 1rem auto;">W</div>
          <h2 style="font-weight: 700;">Welcome to WeTech HR</h2>
          <p class="login-subtitle">Please sign in to access your portal</p>
        </div>

        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="yourname@wetech.com" required>
          </div>
          
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
          </div>

          <div id="loginError" style="color: var(--danger); font-size: 0.9rem; margin-bottom: 1.25rem; display: none; font-weight: 500;">
            Invalid credentials. Please try again.
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1rem; padding: 0.9rem;">Sign In</button>
        </form>

        <div class="demo-info">
          <p style="margin-bottom: 0.5rem; font-weight: 600; color: var(--accent-color);">Demo Accounts:</p>
          <p>• HR Manager: <strong>sarah.connor@wetech.com</strong></p>
          <p>• Developer: <strong>john.doe@wetech.com</strong></p>
          <p>• Regular Staff: <strong>jane.smith@wetech.com</strong></p>
          <p>• Passwords (all accounts): <strong>password123</strong></p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const loginError = document.getElementById('loginError');

    // If user is already logged in, redirect them
    const existingUser = localStorage.getItem('user');
    if (existingUser) {
      const parsedUser = JSON.parse(existingUser);
      if (parsedUser.role && parsedUser.role.toLowerCase().includes('hr')) {
        window.location.href = 'dashboard.html';
      } else {
        window.location.href = 'index.html';
      }
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginError.style.display = 'none';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/employees/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await res.json();
        
        if (res.ok) {
          localStorage.setItem('user', JSON.stringify(data));
          
          // Redirect based on role
          if (data.role && data.role.toLowerCase().includes('hr')) {
            window.location.href = 'dashboard.html';
          } else {
            window.location.href = 'index.html';
          }
        } else {
          loginError.textContent = data.error || 'Invalid credentials. Please try again.';
          loginError.style.display = 'block';
        }
      } catch (err) {
        console.error(err);
        loginError.textContent = 'Server connection error. Please try again later.';
        loginError.style.display = 'block';
      }
    });
  </script>
</body>
</html>
